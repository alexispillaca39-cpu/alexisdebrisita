<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Briggitte 🌼💖</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to bottom, #000000, #1a1a1a);
  font-family: Arial, sans-serif;
}

/* Texto */
.mensaje {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  color: #ffd700;
  font-size: 28px;
  font-weight: bold;
  white-space: pre-line;
}

/* Flores y corazones */
.item {
  position: absolute;
  top: -50px;
  font-size: 25px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>
<body>

<div class="mensaje" id="texto"></div>

<script>
const mensaje = `Para la mujer que amo con toda mi vida 💛
Briggitte 🌼

Eres mi razón favorita...
mi alegría diaria...
y la flor más hermosa de mi vida ✨`;

let i = 0;
function escribirTexto() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribirTexto, 50);
  }
}

escribirTexto();

/* Flores y corazones cayendo */
function crearElemento() {
  const item = document.createElement("div");
  item.classList.add("item");

  // 70% flores, 30% corazones
  if (Math.random() < 0.7) {
    item.innerHTML = "🌼";
  } else {
    item.innerHTML = "💖";
  }

  item.style.left = Math.random() * 100 + "vw";
  item.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(item);

  setTimeout(() => {
    item.remove();
  }, 8000);
}

setInterval(crearElemento, 300);
</script>

</body>
</html>
